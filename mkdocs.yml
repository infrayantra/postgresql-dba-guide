# PostgreSQL DBA Knowledge Base — static site (MkDocs Material)
# Build:  mkdocs build    |    Preview:  mkdocs serve

site_name: PostgreSQL DBA Guide
site_description: Comprehensive PostgreSQL 18 reference for DBAs — by InfraYantra Labs
site_author: InfraYantra Labs
copyright: Copyright &copy; 2026 <a href="https://infrayantra.com/" target="_blank" rel="noopener">InfraYantra Labs</a> · PostgreSQL 18

docs_dir: docs-content
site_dir: site

site_url: https://infrayantra.github.io/postgresql-dba-guide/
repo_url: https://github.com/infrayantra/postgresql-dba-guide
edit_uri: edit/main/docs-content/

use_directory_urls: true
strict: false

exclude_docs: |
  site/
  docs-content/
  .git/
  .github/
  .venv/
  venv/
  scripts/
  requirements-docs.txt
  mkdocs.yml
  .gitignore

theme:
  name: material
  language: en
  logo: assets/infrayantra-labs-logo.jpeg
  favicon: assets/infrayantra-labs-logo.jpeg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: custom
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: custom
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  extra_css:
    - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://infrayantra.com/
      name: InfraYantra Labs
    - icon: fontawesome/solid/envelope
      link: mailto:admin@infrayantra.com
      name: Contact
    - icon: fontawesome/solid/book
      link: https://www.postgresql.org/docs/18/
      name: PostgreSQL 18 Docs
    - icon: fontawesome/solid/download
      link: https://www.postgresql.org/download/
      name: Downloads
  generator: false

plugins:
  - search:
      separator: '[\s\-]+'
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

